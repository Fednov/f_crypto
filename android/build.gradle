allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

subprojects {
    project.plugins.configureEach {
        if (it instanceof com.android.build.gradle.BasePlugin) {
            project.android {
                // Если это библиотека Isar и namespace не задан — задаем его вручную
                if (project.name.contains('isar') && namespace == null) {
                    namespace "dev.isar.isar_flutter_libs"
                } 
                // Для всех остальных библиотек (кроме вашего приложения ':app'), 
                // если namespace пуст, подставляем имя группы
                else if (project.name != 'app' && namespace == null) {
                    namespace project.group
                }
            }
        }
    }
}