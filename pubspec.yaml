name: f_crypto
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.4+5

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  # Utility functions for asynchronous programming (Future, Stream)  
  async: 2.11.0  
  # State management and dependency injection
  flutter_riverpod: 2.6.1
  # Real-time internet connection status monitoring
  internet_connection_checker_plus: 2.5.1
  # Reactive programming extensions for Streams
  rxdart: 0.28.0
  # Wrapper for WebSocket communication
  web_socket_channel: 3.0.3
  # API for making HTTP requests
  http: 1.6.0
  # Isolate management
  worker_manager: 7.2.7
  # Custom icon pack (Line Awesome icons)
  la_icons: 1.0.2
  # Displaying and caching network images
  cached_network_image: 3.4.1
  # Internationalization and localization, formatting (dates, numbers, messages)
  intl: 0.20.2
  
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Common framework for generating Dart code
  build_runner: 2.4.13
  # Generate app logo
  flutter_launcher_icons: 0.14.4
  # Generate Splash Screen
  flutter_native_splash: 2.4.4
  # Mocking library for test
  mocktail: 1.0.4
  # Deterministic testing of time-dependent asynchronous code
  fake_async: 1.3.1
  #  Utility for testing StateNotifier classes
  state_notifier_test: 0.0.10

flutter:
  uses-material-design: true

assets:
  - assets/video/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: 
  image_path: "assets/images/logo/app_logo.png"
  min_sdk_android: 23
  web:
    generate: true
    image_path: "assets/images/logo/app_logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo/app_logo.png"
    icon_size: 48 
  macos:
    generate: true
    image_path: "assets/images/logo/app_logo.png"

flutter_native_splash:
  color: "#000000"           
  image: assets/images/splash/app_splash.png 
  android_12:
    image: assets/images/splash/app_splash.png
    color: "#000000"
    icon_background_color: "#000000"
  android: true
  ios: true
  web: false  
